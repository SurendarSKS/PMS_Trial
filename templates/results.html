<!DOCTYPE html>
<html>
<head>
    <title>Detection Result</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f7f7f7;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        img {
            width: 95%;
            max-width: 600px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }
        .card {
            background: #f1f1f1;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
        }
        a, button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #1976d2;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>✅ Detection Result</h2>
        <img src="{{ image_url }}" alt="Captured Image">

        <div class="card">
            <p><b>Username:</b> {{ username }}</p>
            <p><b>Timestamp:</b> {{ timestamp }}</p>
            <p><b>Car Number:</b> {{ car_number }}</p>
            <p><b>Car Confidence:</b> {{ car_confidence }}</p>
            <p><b>Slot Number:</b> {{ slot_number }}</p>
            <p><b>Slot Confidence:</b> {{ slot_confidence }}</p>
        </div>

        <a href="/">⬅ Back to Home</a>
    </div>
</body>
</html>
