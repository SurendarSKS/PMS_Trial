<!DOCTYPE html>
<html>
<head>
    <title>Full Screen Camera</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
            height: 100%;
        }
        #camera-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: black;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
        .controls {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        button {
            padding: 14px 24px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            background: #1976d2;
            color: white;
            margin: 8px;
        }
        .info {
            position: absolute;
            top: 15px;
            width: 100%;
            text-align: center;
            z-index: 10;
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 1px 1px 4px black;
        }
    </style>
</head>
<body>
    <div id="camera-container">
        <div class="info">
            Align NUMBER PLATE in green box and SLOT in yellow box
        </div>
        <video id="video" autoplay playsinline></video>
        <canvas id="overlay"></canvas>
        <canvas id="captureCanvas" style="display:none;"></canvas>

        <div class="controls">
            <button onclick="startCamera()">Start Camera</button>
            <button onclick="captureImage()">Capture</button>
            <button onclick="window.location.href='/'">Back</button>
        </div>
    </div>

    <form id="captureForm" action="/capture_fullscreen" method="POST">
        <input type="hidden" name="image_data" id="image_data">
    </form>

    <script>
        let video = document.getElementById("video");
        let overlay = document.getElementById("overlay");
        let captureCanvas = document.getElementById("captureCanvas");
        let stream = null;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = stream;

                overlay.width = window.innerWidth;
                overlay.height = window.innerHeight;
                drawGuides();
            } catch (err) {
                alert("Camera error: " + err);
            }
        }

        function drawGuides() {
            let ctx = overlay.getContext("2d");
            let w = overlay.width;
            let h = overlay.height;

            ctx.clearRect(0, 0, w, h);

            // Plate guide
            let plateX = w * 0.18;
            let plateY = h * 0.34;
            let plateW = w * 0.64;
            let plateH = h * 0.14;

            // Slot guide
            let slotX = w * 0.28;
            let slotY = h * 0.74;
            let slotW = w * 0.44;
            let slotH = h * 0.10;

            ctx.strokeStyle = "lime";
            ctx.lineWidth = 4;
            ctx.strokeRect(plateX, plateY, plateW, plateH);
            ctx.font = "20px Arial";
            ctx.fillStyle = "lime";
            ctx.fillText("NUMBER PLATE", plateX, plateY - 10);

            ctx.strokeStyle = "yellow";
            ctx.lineWidth = 4;
            ctx.strokeRect(slotX, slotY, slotW, slotH);
            ctx.fillStyle = "yellow";
            ctx.fillText("SLOT", slotX, slotY - 10);
        }

        function captureImage() {
            let ctx = captureCanvas.getContext("2d");
            captureCanvas.width = video.videoWidth;
            captureCanvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            let data = captureCanvas.toDataURL("image/jpeg", 0.95);
            document.getElementById("image_data").value = data;
            document.getElementById("captureForm").submit();
        }
    </script>
</body>
</html>
